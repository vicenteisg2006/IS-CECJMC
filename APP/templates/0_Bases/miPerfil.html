<!-- Pagina de Perfil -->

{% load static %}

<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Mi Perfil - REL+{% endblock %}</title>

        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    </head>

    <body>
        <nav class="navbar navbar-dark sticky-top py-1" style="background-color: #000000; min-height: 60px;">
            <div class="container-fluid d-flex align-items-center justify-content-between flex-nowrap">

                <!-- Titulito -->
                <div style="width: 100px;", class="d-none d-sm-block">
                    <span class="navbar-brand mb-0 titulito1-navbar">REL+</span>
                </div>

                <!-- Barra de Busqueda-->
                <form class="d-flex flex-grow-1 form-control-lg m-0" role="search" style="max-width: 800px; width: 100%;">
                    <div class="input-group d-flex w-100">
                        <input class="form-control" type="search" placeholder="Buscar" aria-label="Buscar" style="border-radius: 20px 0 0 20px;">
                        <button class="btn btn-outline-light" type="submit" style="border-radius: 0 20px 20px 0;">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <!-- Icono perfil -->
                <div style="width: 100px;" class="d-flex justify-content-end">
                    <div class="dropdown">

                        <a href="#" class="d-flex align-items-center text-decoration-none text-light"
                            id="menusitoPerfilsito"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">

                            <img src="{{ request.user.get_avatar }}" alt="Profile" class="rounded-circle fotito1-navbar">
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="menusitoPerfilsito" style="border-radius: 12px; margin-top: 10px;">
                            <li><h6 class="dropdown-header fw-bold">Mi Cuenta<h6></li>
                            <li><a class="dropdown-item" href="{% url 'ver_perfil' %}"><i class="bi bi-person me-2"></i>Perfil</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-gear-fill me-2"></i>Configuración</a></li>
                            
                            <li><hr class="d-lg-none" class="dropdown-divider"></li>

                            <li><h6 class="dropdown-header fw-bold d-lg-none">Tablero</h6></li>

                            <li class="d-lg-none"><a class="dropdown-item" href="{% url 'student' %}"><i class="bi bi-house-door me-2"></i>Home</a></li>
                            <li class="d-lg-none"><a class="dropdown-item" href="{% url 'notificaciones_e' %}"><i class="bi bi-bell me-2"></i>Notificaciones</a></li>
                            <li class="d-lg-none"><a class="dropdown-item" href="{% url 'practicas_e' %}"><i class="bi bi-pencil me-2"></i> Prácticas</a></li>
                            <li class="d-lg-none"><a class="dropdown-item" href="{% url 'empresas_e' %}"><i class="bi bi-building me-2"></i> Empresas</a></li>
                            <li class="d-lg-none"><a class="dropdown-item" href="{% url 'tareas_e' %}"><i class="bi bi-book me-2"></i> Tareas</a></li>
                            <li class="d-lg-none"><a class="dropdown-item" href="{% url 'conexiones_e' %}"><i class="bi bi-people me-2"></i> Conexiones</a></li>

                            <li><hr class="d-lg-none" class="dropdown-divider"></li>

                            <li class="d-lg-none"><a class="dropdown-item text-danger" href="{% url 'logout' %}"><i class="bi bi-door-open me-2"></i> Cerrar Sesión</a></li>

                        </ul>

                    </div>
                </div>

            </div>
        </nav>

        <!---->

    </body>
</html>
