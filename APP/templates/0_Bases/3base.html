<!-- Base colegio -->

{% load static %}

<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Base colegio {% endblock %}</title>

        <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    </head>

    <body>
        <nav class="navbar navbar-dark sticky-top py-1" style="background-color: #000000; min-height: 60px;">
            <div class="container-fluid d-flex  align-items-center justify-content-between flex-nowrap">

                <!-- Titulito -->
                <div style="width: 100px;", class="d-none d-sm-block">
                    <span class="navbar-brand mb-0 titulito1-navbar">REL+</span>
                </div>

                <!-- Barra de Busqueda-->
                <form class="d-flex flex-grow-1 form-control-lg m-0" role="search" style="max-width: 800px; width: 100%;">
                    <div class="input-group d-flex w-100">
                        <input class="form-control" type="search" placeholder="Buscar" aria-label="Buscar" style="border-radius: 20px 0 0 20px;">
                        <button class="btn btn-outline-light" type="submit" style="border-radius: 0 20px 20px 0;">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <!-- Icono perfil -->
                <div style="width: 100px;" class="d-flex justify-content-end">
                    <div class="dropdown">

                        <a href="#" class="d-flex align-items-center text-decoration-none text-light"
                            id="menusitoPerfilsito"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">

                            <img src="{{ request.user.get_avatar }}" alt="Profile" class="rounded-circle fotito1-navbar">
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="menusitoPerfilsito" style="border-radius: 12px; margin-top: 10px;">
                            <li><h6 class="dropdown-header fw-bold">Mi Cuenta<h6></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Perfil</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-gear-fill me-2"></i>Configuración</a></li>
                            
                            <li><hr class="d-lg-none" class="dropdown-divider"></li>

                            <li><h6 class="dropdown-header fw-bold d-lg-none">Tablero</h6></li>

                            <li class="d-lg-none"><a class="dropdown-item" href="{% url 'school' %}"><i class="bi bi-house-door me-2"></i>Home</a></li>
                            <li class="d-lg-none"><a class="dropdown-item" href="{% url 'administracion' %}"><i class="bi bi-person-gear me-2"></i>Administración</a></li>

                            <li><hr class="d-lg-none" class="dropdown-divider"></li>

                            <li class="d-lg-none"><a class="dropdown-item text-danger" href="{% url 'logout' %}"><i class="bi bi-door-open me-2"></i> Cerrar Sesión</a></li>

                        </ul>

                    </div>
                </div>

            </div>
        </nav>

        <!-- Contendor de la pagina-->
        <div class="container-fluid mt-4" style="max-width: 1400px;">
            <div class="row justify-content-center">

                <!-- Columna 1: Perfil y funciones -->
                <div class="col-lg-3 d-none d-lg-block mb-4">
                    <div class="sticky-top" style="top: 80px; z-index: 1;">

                        <div class="card p-3 shadow-sm" style="border-radius: 15px;">
                            <div class="d-flex align-items-center">
                                <img src="{{ request.user.get_avatar }}" alt="Perfil" class="rounded-circle me-2" style="width: 40px; height: 40px; object-fit: cover;">
                                <p class="mb-0"> {{ request.user.first_name }} {{ request.user.last_name }} </p>
                            </div>
                        </div>

                        <div class="card p-3 shadow-sm mt-3" style="border-radius: 15px;">
                            <div class="d-flex align-items-start flex-column mt-2">

                                <a href="{% url 'school' %}" class="text-decoration-none text-dark fw-medium mb-2">
                                    <i class="bi bi-house-door fs-5 me-2"></i> Home
                                </a>
                                <a href="{% url 'administracion' %}" class="text-decoration-none text-dark fw-medium mb-2">
                                    <i class="bi bi-person-gear fs-5 me-2"></i> Administracion
                                </a>
                                <a href="{% url 'logout' %}" class="text-decoration-none text-dark fw-medium mb-2">
                                    <i class="bi bi-door-open fs-5 me-2"></i> Cerrar Sesión
                                </a>

                            </div>
                        </div>

                    </div>
                </div>

                <!-- Columna 2: Contenido principal -->
                <div class="col-lg-9 col-md-8 mb-4">
                    <main id="content">
                        {% block content %}
                        {% endblock %}
                    </main>
                </div>

            </div>
        </div>


        <!-- que quede al final del html siempre -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
        <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    </body>

</html>
