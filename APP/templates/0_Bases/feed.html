{% load static %}
{% for post in posts %}
    <div class="card p-3 shadow-sm mb-3" style="border-radius: 15px;">
        <div class="d-flex align-items-center mb-2">
            <img src="{% static 'images/profilepic1.jpg' %}" class="rounded-circle me-2" style="width: 35px; height: 35px; object-fit: cover;">
            <div>
                <h6 class="mb-0 fw-bold">{{ post.usuario.get_full_name|default:post.usuario.username }}</h6>
                <small class="text-muted">{{ post.fecha_publicacion|date:"d M, Y - H:i" }}</small>
            </div>
        </div>
        <p class="mb-2">{{ post.mensaje }}</p>
        <hr class="my-2">
        <div class="d-flex justify-content-around">
            <button class="btn btn-light btn-sm w-100 me-1 btn-like" 
                    data-id="{{ post.id }}" 
                    style="border-radius: 10px;">
                <i class="bi {% if request.user in post.likes.all %}bi-heart-fill text-danger{% else %}bi-heart{% endif %} me-1"></i> 
                <span class="like-count">{{ post.likes.count }}</span>
            </button>
            <button class="btn btn-light btn-sm w-100 ms-1" style="border-radius: 10px;">
                <i class="bi bi-chat-left me-1"></i> {{ post.comentarios.count }}
            </button>
        </div>
    </div>
{% empty %}
    <p class="text-center text-muted">No hay publicaciones aún.</p>
{% endfor %}

<script>
    document.querySelectorAll('.btn-like').forEach(button => {
        button.addEventListener('click', function() {
            const postId = this.dataset.id;
            const icon = this.querySelector('i');
            const countSpan = this.querySelector('.like-count');

            fetch(`/like/${postId}/`, {
                method: 'GET',
                headers: {'X-Requested-With': 'XMLHttpRequest'}
            })
            .then(response => response.json())
            .then(data => {
                countSpan.innerText = data.count;
                if (data.liked) {
                    icon.classList.replace('bi-heart', 'bi-heart-fill');
                    icon.classList.add('text-danger');
                } else {
                    icon.classList.replace('bi-heart-fill', 'bi-heart');
                    icon.classList.remove('text-danger');
                }
            });
        });
    });
</script>
