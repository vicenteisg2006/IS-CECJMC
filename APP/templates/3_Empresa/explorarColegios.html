{% extends "0_Bases/3base.html" %}
{% block content %}
<div class="container-fluid py-4">
    <h2 class="fw-bold mb-3"><i class="bi bi-search me-2 text-primary"></i>Explorar Instituciones</h2>
    
    <form method="GET" class="mb-4">
        <div class="input-group shadow-sm" style="border-radius: 10px; overflow: hidden;">
            <input type="text" name="q" class="form-control border-0" placeholder="Buscar por nombre o dirección..." value="{{ query }}">
            <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i></button>
        </div>
    </form>

    <div class="row g-4">
        {% for c in colegios %}
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-3" style="border-radius: 15px;">
                <div class="d-flex align-items-center">
                    <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3">
                        <i class="bi bi-building fs-3 text-primary"></i>
                    </div>
                    <div>
                        <h6 class="fw-bold mb-0">{{ c.nombre }}</h6>
                        <small class="text-muted">{{ c.direccion }}</small>
                    </div>
                    <div class="ms-auto">
                        <span class="badge bg-light text-primary border border-primary">Disponible para convenio</span>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5"><p class="text-muted">No se encontraron instituciones nuevas.</p></div>
        {% endfor %}
    </div>
</div>
{% endblock %}
