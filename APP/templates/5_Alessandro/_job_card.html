<article class="bg-white rounded-lg border border-gray-200 p-6 hover:border-teal-500 hover:shadow-md transition-all cursor-pointer" onclick="window.location='{% url 'job_detail' job.id %}'">
  <div class="flex gap-4">
    <img src="{{ job.company.logo }}" alt="{{ job.company.name }}"
      class="w-16 h-16 rounded object-cover shrink-0"
      onerror="this.src='https://ui-avatars.com/api/?name={{ job.company.name|urlencode }}&background=0d9488&color=fff'" />
    <div class="flex-1 min-w-0">
      <h3 class="font-semibold text-lg text-teal-700 hover:text-teal-800">{{ job.title }}</h3>
      <p class="text-gray-900 font-medium text-sm">{{ job.company.name }}</p>
      <div class="flex flex-wrap gap-4 mt-2 text-sm text-gray-600">
        <div class="flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span>{{ job.location }}</span>
        </div>
        <div class="flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          <span>{{ job.type }}</span>
        </div>
        <div class="flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span>{{ job.duration }} · {{ job.posted_ago }}</span>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mt-3">
        <span class="text-xs bg-cyan-50 text-cyan-700 px-2 py-1 rounded-full">{{ job.area }}</span>
        <span class="text-xs bg-blue-50 text-blue-700 px-2 py-1 rounded-full">{{ job.level }}</span>
      </div>
      {% if job.stipend %}
      <p class="mt-2 text-sm text-emerald-700 font-semibold">{{ job.stipend }}</p>
      {% endif %}
      <div class="flex items-center gap-2 mt-3 text-sm text-gray-500">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <span>{{ job.applicants }} postulantes</span>
      </div>
    </div>
  </div>
  <div class="mt-4 flex gap-2">
    <a href="{% url 'job_detail' job.id %}" onclick="event.stopPropagation()"
      class="px-4 py-2 bg-teal-700 text-white rounded-lg hover:bg-teal-800 transition-colors text-sm font-medium">Postularme</a>
    <button onclick="event.stopPropagation()"
      class="px-4 py-2 border border-teal-700 text-teal-700 rounded-lg hover:bg-teal-50 transition-colors text-sm font-medium">Guardar</button>
  </div>
</article>
